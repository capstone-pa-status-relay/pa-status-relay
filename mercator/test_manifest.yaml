# Mercator manual traceability manifest - PA Status Relay
#
# Each entry connects one PRD acceptance criterion to a real, stable test
# specification identifier in docs/REGRESSION_TESTS.md. This establishes
# pre-implementation traceability only. It does not claim implementation,
# execution, or a passing result.

tests:
  - id: "MAP-AC-001"
    covers: "User can view a list of mock PA cases with key metadata"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-001"
  - id: "MAP-AC-002"
    covers: "User can search, sort, and filter cases by status, patient name, or date"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-002"
  - id: "MAP-AC-003"
    covers: "User can create a new case with required fields"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-003"
  - id: "MAP-AC-004"
    covers: "User can edit an existing case's metadata"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-005"
  - id: "MAP-AC-005"
    covers: "User can select only valid status transitions from the current state"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-055"
  - id: "MAP-AC-006"
    covers: "User is blocked from completing a transition if required metadata is missing"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-025"
  - id: "MAP-AC-007"
    covers: "User sees an immutable audit entry within 500ms of a successful status change"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-033"
  - id: "MAP-AC-008"
    covers: "User can provide an optional reason code on any transition"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-026"
  - id: "MAP-AC-009"
    covers: "User sees a plain-language message preview modal on every status change when consent flag is TRUE"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-035"
  - id: "MAP-AC-010"
    covers: "User sees a disabled send state with a consent CTA when consent flag is FALSE"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-036"
  - id: "MAP-AC-011"
    covers: "User can edit the templated message text in the preview modal"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-037"
  - id: "MAP-AC-012"
    covers: "User can view a chronological, immutable audit trail per case"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-034"
  - id: "MAP-AC-013"
    covers: "User cannot edit or delete audit trail entries"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-040"
  - id: "MAP-AC-014"
    covers: "User can filter the audit trail by action type, actor, or date range without a page reload"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-043"
  - id: "MAP-AC-015"
    covers: "User can export the audit trail as a CSV"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-044"
  - id: "MAP-AC-016"
    covers: "User can Reset a case to its seeded baseline state"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-046"
  - id: "MAP-AC-017"
    covers: "User can Clone a case, creating an independent copy with an empty audit trail"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-047"
  - id: "MAP-AC-018"
    covers: "User can replay a scenario from Clone without affecting the original case's audit trail"
    evidence_path: "docs/REGRESSION_TESTS.md"
    evidence_locator: "TC-056"
