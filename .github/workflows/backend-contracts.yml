name: Backend contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  status-machine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run backend contract tests
        run: node --experimental-strip-types --test tests/*.test.ts
